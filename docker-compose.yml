version: "3.9"

services:
  # ── PostgreSQL — single database for both modules ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: unified_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-unified_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO — object storage for user photo uploads ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: unified_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Unified FastAPI Application ───────────────────────────────────────────
  api:
    build: .
    container_name: unified_api
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host names to use Docker service names (not localhost)
      POSTGRES_HOST:   postgres
      POSTGRES_PORT:   "5432"
      MINIO_ENDPOINT:  minio:9000
      # photo_url returned to clients uses the host-accessible URL
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
